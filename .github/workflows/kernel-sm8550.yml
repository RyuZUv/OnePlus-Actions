name: build-sm8550
permissions:
  contents: write
  actions: write

on:
  workflow_call: 
    inputs:
      CPU:
        required: true
        type: string
      FEIL:
        required: false
        type: string
      CPUD:
        required: true
        type: string
      ANDROID_VERSION:
        required: true
        type: string
      KERNEL_VERSION:
        required: true
        type: string
      KPM:
       required: true
       type: string
      lz4kd:
       required: true
       type: string
      bbr:
       required: true
       type: string
      proxy:
       required: true
       type: string

jobs:
  build-kernel-sm8550:
    strategy:
      fail-fast: false
      matrix:
        include:
        - FEIL: 'oneplus_11'
        #- FEIL: 'oneplus_12_r'
        #- FEIL: 'oneplus_ace2_pro'
        #- FEIL: 'oneplus_ace3'
        #- FEIL: 'oneplus_open'
        
    uses: ./.github/workflows/Call_Build.yml
    secrets: inherit
    with:
      CPU: ${{ inputs.CPU }}
      FEIL: ${{ matrix.FEIL }}
      CPUD: ${{ inputs.CPUD }}
      ANDROID_VERSION: ${{ inputs.ANDROID_VERSION }}
      KERNEL_VERSION: ${{ inputs.KERNEL_VERSION }}
      KPM: ${{ inputs.KPM }}
      lz4kd: ${{ inputs.lz4kd }}
      bbr: ${{ inputs.bbr }}
      proxy: ${{ inputs.proxy }}
