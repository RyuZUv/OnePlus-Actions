  #     CPUD: "pineapple"
  #     ANDROID_VERSION: "android14"
  #     KERNEL_VERSION: "6.1"
  #     KPM: "Off"
  #     lz4kd: "Off"
  #     bbr: "Off"
  #     proxy: "On"
